name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish main to gh-pages
        run: git push --force origin HEAD:gh-pages
      - name: Verify site is live
        run: |
          base="https://hisnameisbear.github.io/Loadout"
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$base/?nocache=$GITHUB_RUN_ID-$i")
            echo "Attempt $i: $base/ -> $code"
            if [ "$code" = "200" ]; then
              m=$(curl -s -o /dev/null -w "%{http_code}" "$base/manifest.webmanifest")
              s=$(curl -s -o /dev/null -w "%{http_code}" "$base/sw.js")
              echo "manifest.webmanifest -> $m, sw.js -> $s"
              [ "$m" = "200" ] && [ "$s" = "200" ] && exit 0
              echo "Manifest or service worker not reachable"; exit 1
            fi
            sleep 10
          done
          echo "Site did not return 200 within timeout"; exit 1
